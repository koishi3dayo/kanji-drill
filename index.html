<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#4a90d9">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="漢字ドリル">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>漢字ドリル</title>
<style>
:root {
  --bg: #f8f6f0;
  --card: #ffffff;
  --primary: #4a90d9;
  --primary-dark: #2c6fad;
  --accent: #f5a623;
  --danger: #e74c3c;
  --success: #27ae60;
  --text: #2c3e50;
  --text-light: #7f8c8d;
  --border: #e0d9cc;
  --grade2: #a8d8ea;
  --grade3: #aa96da;
  --grade4: #fcbad3;
  --grade5: #ffffd2;
  --heat0: #e8e8e8;
  --heat1: #c8e6c9;
  --heat2: #66bb6a;
  --heat3: #2e7d32;
  --heatlow: #ef9a9a;
  --heatmid: #ffcc02;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body {
  font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-tap-highlight-color: transparent;
}
#app { max-width: 480px; margin: 0 auto; min-height: 100vh; min-height: 100dvh; position: relative; }

/* タップ操作の最適化: ボタン類はダブルタップ拡大を無効化 */
button, .nav-btn, .heat-cell, .kl-cell, .cal-cell, .grade-tab { touch-action: manipulation; }

/* ── ナビゲーション ── */
.nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 480px;
  background: var(--card); border-top: 1px solid var(--border);
  display: flex; z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1; padding: 10px 4px 6px; border: none; background: none;
  cursor: pointer; display: flex; flex-direction: column;
  align-items: center; gap: 3px; font-size: 10px; color: var(--text-light);
  transition: color .2s; min-height: 52px;
}
.nav-btn.active { color: var(--primary); }
.nav-btn .icon { font-size: 22px; }

/* ── スクリーン共通 ── */
.screen { display: none; padding: 16px 16px calc(84px + env(safe-area-inset-bottom)); }
.screen.active { display: block; }

/* ── ホーム ── */
.home-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; border-radius: 16px; padding: 20px;
  margin-bottom: 16px; text-align: center;
}
.home-header h1 { font-size: 26px; margin-bottom: 4px; }
.home-header .subtitle { font-size: 13px; opacity: .85; }
.streak-box {
  background: rgba(255,255,255,.2); border-radius: 10px;
  padding: 10px 16px; margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  font-size: 15px; font-weight: bold;
}
.streak-num { font-size: 28px; }

.card {
  background: var(--card); border-radius: 14px;
  padding: 18px; margin-bottom: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.card-title {
  font-size: 13px; color: var(--text-light);
  margin-bottom: 10px; font-weight: bold; letter-spacing: .5px;
}
.stat-row { display: flex; gap: 10px; }
.stat-item {
  flex: 1; background: var(--bg); border-radius: 10px;
  padding: 12px; text-align: center;
}
.stat-num { font-size: 24px; font-weight: bold; color: var(--primary); }
.stat-label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

.btn {
  display: block; width: 100%; padding: 16px;
  border: none; border-radius: 14px; font-size: 17px; font-weight: bold;
  cursor: pointer; transition: transform .1s, box-shadow .1s;
}
.btn:active { transform: scale(.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: #fff; box-shadow: 0 4px 12px rgba(74,144,217,.4);
}
.btn-success {
  background: linear-gradient(135deg, #27ae60, #1e8449);
  color: #fff; box-shadow: 0 4px 12px rgba(39,174,96,.4);
}
.btn-outline {
  background: transparent; color: var(--primary);
  border: 2px solid var(--primary); font-size: 14px; padding: 12px;
}
.btn-sm {
  display: inline-block; width: auto; padding: 8px 16px;
  font-size: 13px; border-radius: 20px;
}

/* ── テスト ── */
.quiz-progress {
  display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
}
.progress-bar {
  flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden;
}
.progress-fill {
  height: 100%; background: var(--primary); border-radius: 4px;
  transition: width .3s;
}
.progress-text { font-size: 13px; color: var(--text-light); min-width: 40px; text-align: right; }

.quiz-type-badge {
  display: inline-block; padding: 4px 10px; border-radius: 20px;
  font-size: 12px; font-weight: bold; margin-bottom: 12px;
}
.type-kaki { background: #e3f2fd; color: #1565c0; }
.type-jukugo { background: #f3e5f5; color: #6a1b9a; }
.type-yourei { background: #e8f5e9; color: #1b5e20; }

.quiz-question {
  font-size: 16px; line-height: 1.7; margin-bottom: 8px;
  background: var(--bg); border-radius: 12px; padding: 16px;
}
.quiz-reading {
  font-size: 22px; font-weight: bold; color: var(--primary);
  text-align: center; padding: 10px 0 16px;
}

.paper-hint {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 15px; font-weight: bold; color: #8a6d1a;
  background: #fff8e1; border: 2px dashed var(--accent);
  border-radius: 12px; padding: 14px; margin-bottom: 14px;
}
.answer-reveal {
  background: var(--bg); border: 2px solid var(--primary);
  border-radius: 14px; text-align: center;
  padding: 18px 14px; margin-bottom: 12px;
}
.answer-label { font-size: 12px; font-weight: bold; color: var(--primary); letter-spacing: 2px; }
.answer-kanji { font-size: 60px; font-weight: bold; line-height: 1.3; }
.answer-yomi { font-size: 15px; color: var(--text-light); }
.grade-check-label {
  font-size: 13px; color: var(--text-light);
  text-align: center; margin-bottom: 10px;
}
.btn-row { display: flex; gap: 10px; }
.btn-maru {
  flex: 1; background: linear-gradient(135deg, #27ae60, #1e8449);
  color: #fff; box-shadow: 0 4px 12px rgba(39,174,96,.35);
}
.btn-batsu {
  flex: 1; background: linear-gradient(135deg, #e74c3c, #b93225);
  color: #fff; box-shadow: 0 4px 12px rgba(231,76,60,.35);
}
.btn-back {
  flex: 0 0 auto; width: auto; padding: 14px 18px;
  background: var(--bg); color: var(--text-light);
  border: 1px solid var(--border); font-size: 14px;
}
.quiz-qnum {
  font-size: 13px; font-weight: bold; color: var(--text-light);
  margin: 8px 0 4px;
}
.tgt-u { text-decoration-color: var(--accent); text-decoration-thickness: 3px; text-underline-offset: 5px; }
.tgt { color: var(--primary); }

/* ── 出題一覧 ── */
.q-item { padding: 14px 16px; }
.retry-badge { font-size: 11px; color: var(--danger); font-weight: bold; }

/* ── 答え合わせリスト ── */
.grade-item { padding: 14px 16px; }
.grade-item-top { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.gnum {
  flex: 0 0 auto; width: 26px; height: 26px; border-radius: 50%;
  background: var(--primary); color: #fff; font-size: 13px; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
}
.gq { font-size: 13px; color: var(--text-light); }
.ganswer {
  font-size: 26px; font-weight: bold; text-align: center;
  background: var(--bg); border-radius: 10px; padding: 12px; margin-bottom: 10px;
}
.gbtn { padding: 10px; font-size: 20px; }
.gsel { outline: 3px solid var(--text); transform: scale(1.02); }
.gdim { opacity: .35; }

/* ── 結果 ── */
.result-score {
  text-align: center; padding: 24px 0 16px;
}
.score-circle {
  width: 120px; height: 120px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 0 auto 12px;
  border: 6px solid var(--primary);
}
.score-num { font-size: 40px; font-weight: bold; color: var(--primary); }
.score-den { font-size: 16px; color: var(--text-light); }
.score-msg { font-size: 18px; font-weight: bold; margin-bottom: 4px; }
.score-sub { font-size: 13px; color: var(--text-light); }

.wrong-list { list-style: none; }
.wrong-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.wrong-kanji { font-size: 28px; min-width: 40px; text-align: center; }
.wrong-detail { flex: 1; }
.wrong-q { font-size: 12px; color: var(--text-light); }
.wrong-a { font-size: 14px; font-weight: bold; color: var(--danger); }

/* ── ヒートマップ ── */
.grade-tabs {
  display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto;
  padding-bottom: 4px;
}
.grade-tab {
  padding: 6px 14px; border-radius: 20px; border: 2px solid var(--border);
  background: none; font-size: 13px; cursor: pointer; white-space: nowrap;
  transition: all .2s;
}
.grade-tab.active { border-color: var(--primary); color: var(--primary); background: #e8f0fe; }

.heatmap-legend {
  display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  font-size: 11px; color: var(--text-light);
}
.legend-box { width: 14px; height: 14px; border-radius: 3px; }

.heatmap-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr));
  gap: 5px;
}
.heat-cell {
  aspect-ratio: 1; border-radius: 8px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; cursor: pointer;
  transition: transform .15s;
  font-size: 18px; font-weight: bold; position: relative;
}
.heat-cell:hover { transform: scale(1.1); z-index: 1; }
.heat-cell .cell-pct {
  font-size: 8px; font-weight: normal; position: absolute;
  bottom: 2px; color: rgba(0,0,0,.5);
}
.heat-none  { background: var(--heat0); color: #aaa; }
.heat-low   { background: var(--heatlow); color: #7b0000; }
.heat-mid   { background: var(--heatmid); color: #5a4000; }
.heat-high  { background: var(--heat2); color: #1b5e20; }
.heat-perfect { background: var(--heat3); color: #fff; }

/* ── カンジ一覧 ── */
.kanji-list-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px;
}
.kl-cell {
  aspect-ratio: 1; background: var(--card); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: bold; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  border: 2px solid transparent; transition: border-color .15s;
}
.kl-cell:hover { border-color: var(--primary); }
.grade2-bg { background: #e3f4fb; }
.grade3-bg { background: #f0ebff; }
.grade4-bg { background: #ffeef5; }
.grade5-bg { background: #fffff0; }

/* ── モーダル ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.4); z-index: 200; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card); border-radius: 20px; padding: 24px;
  max-width: 320px; width: 90%; text-align: center;
}
.modal-kanji { font-size: 56px; margin-bottom: 8px; }
.modal-reading { font-size: 14px; color: var(--text-light); margin-bottom: 12px; }
.modal-words { text-align: left; }
.modal-word { padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.modal-word:last-child { border: none; }
.modal-close {
  margin-top: 16px; padding: 10px 24px; background: var(--primary);
  color: #fff; border: none; border-radius: 20px; font-size: 14px; cursor: pointer;
}

/* ── アニメーション ── */
@keyframes popIn {
  0% { transform: scale(.8); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}
.pop { animation: popIn .25s ease; }

.grade-label {
  font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 10px;
  display: inline-block; margin-bottom: 10px;
}
.g2 { background: var(--grade2); }
.g3 { background: var(--grade3); color: #fff; }
.g4 { background: var(--grade4); }
.g5 { background: var(--grade5); }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); font-size: 14px; }
.empty-icon { font-size: 48px; margin-bottom: 10px; }

/* ── 学習カレンダー ── */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.cal-nav-btn {
  border: none; background: var(--card); border-radius: 10px;
  width: 40px; height: 40px; font-size: 18px; cursor: pointer;
  box-shadow: 0 1px 4px rgba(0,0,0,.08); color: var(--primary);
}
.cal-label { font-size: 16px; font-weight: bold; }
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  text-align: center; font-size: 11px; color: var(--text-light);
  margin-bottom: 6px;
}
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
}
.cal-cell {
  aspect-ratio: 1; border-radius: 10px; background: var(--card);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 1px 3px rgba(0,0,0,.06); position: relative;
}
.cal-cell.empty { background: none; box-shadow: none; cursor: default; }
.cal-day { font-size: 13px; }
.cal-check { font-size: 13px; position: absolute; bottom: 2px; }
.cal-cell.cal-done { background: #e8f8ee; border: 2px solid var(--success); }
.cal-cell.cal-today .cal-day { color: var(--primary); font-weight: bold; }
.cal-cell.cal-today { outline: 2px solid var(--primary); }
.cal-detail-box {
  margin-top: 14px; background: var(--card); border-radius: 12px;
  padding: 14px 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.cal-detail-date { font-size: 13px; color: var(--text-light); margin-bottom: 4px; }
.cal-detail-score { font-size: 24px; font-weight: bold; color: var(--primary); }

h2 { font-size: 18px; margin-bottom: 14px; }
.section-title { font-size: 13px; font-weight: bold; color: var(--text-light); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .5px; }

.today-done-banner {
  background: linear-gradient(135deg, #27ae60, #1e8449);
  color: #fff; border-radius: 14px; padding: 18px;
  text-align: center; margin-bottom: 14px;
}
.today-done-banner .big { font-size: 32px; margin-bottom: 4px; }
.today-done-banner p { font-size: 14px; opacity: .9; }

/* ── プロフィール切り替え ── */
.profile-card { padding: 16px; }
.profile-tabs { display: flex; gap: 8px; }
.profile-btn {
  flex: 1; padding: 12px 4px; border-radius: 12px;
  border: 2px solid var(--border); background: var(--card);
  font-size: 15px; font-weight: bold; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  min-height: 56px; transition: all .15s;
}
.profile-btn .p-grade { font-size: 10px; font-weight: normal; color: var(--text-light); }
.profile-btn.active {
  border-color: var(--primary); background: #e8f0fe; color: var(--primary);
}
.profile-btn.active .p-grade { color: var(--primary); }
.profile-badge {
  display: inline-block; background: #e8f0fe; color: var(--primary);
  font-size: 13px; font-weight: bold; padding: 4px 12px;
  border-radius: 20px; margin-bottom: 12px;
}

/* ── タッチ操作: 最小タップ領域の確保 ── */
.cal-nav-btn { width: 44px; height: 44px; }
.grade-tab { min-height: 40px; }
.modal-close { min-height: 44px; }
.gbtn { min-height: 48px; }

/* ── 狭い画面（スマホ）向け調整 ── */
@media (max-width: 380px) {
  .screen { padding-left: 12px; padding-right: 12px; }
  .home-header { padding: 16px; }
  .home-header h1 { font-size: 23px; }
  .card { padding: 14px; }
  .quiz-reading { font-size: 20px; }
  .answer-kanji { font-size: 52px; }
  .kanji-list-grid { grid-template-columns: repeat(5, 1fr); }
  .stat-num { font-size: 21px; }
  .cal-day { font-size: 12px; }
  .nav-btn { font-size: 9px; }
}

/* ── タブレット等の大きめ画面: 文字を少しゆったり ── */
@media (min-width: 600px) {
  .quiz-reading { font-size: 24px; }
  .answer-kanji { font-size: 64px; }
}
</style>
</head>
<body>
<div id="app">
  <!-- ホーム -->
  <div id="screen-home" class="screen active">
    <!-- だれがやる？ プロフィール切り替え -->
    <div class="card profile-card">
      <div class="card-title">👦 だれが やる？</div>
      <div class="profile-tabs" id="profile-tabs"></div>
      <div class="card-title" style="margin-top:12px">🎒 学年（がくねん）をえらぶ</div>
      <div class="grade-tabs" id="home-grade-tabs"></div>
    </div>
    <div class="home-header">
      <h1>✏️ 漢字ドリル</h1>
      <div class="subtitle" id="home-subtitle">毎日10問で漢字マスター！</div>
      <div class="streak-box">
        🔥 <span class="streak-num" id="streak-num">0</span> 日連続！
      </div>
    </div>
    <div id="today-status"></div>
    <div class="card">
      <div class="card-title">📊 今週のせいせき</div>
      <div class="stat-row">
        <div class="stat-item"><div class="stat-num" id="stat-total">0</div><div class="stat-label">かいとう数</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">せいかい数</div></div>
        <div class="stat-item"><div class="stat-num" id="stat-rate">-</div><div class="stat-label">せいかいりつ</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🏆 バッジ</div>
      <div id="badges" style="font-size:24px;letter-spacing:4px;min-height:36px"></div>
    </div>
  </div>

  <!-- テスト -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-progress">
      <div class="progress-bar"><div class="progress-fill" id="qprogress" style="width:0%"></div></div>
      <div class="progress-text" id="qcounter">1/10</div>
    </div>
    <div id="quiz-content"></div>
  </div>

  <!-- けっか -->
  <div id="screen-result" class="screen">
    <div class="result-score">
      <div class="score-circle pop">
        <div class="score-num" id="res-score">0</div>
        <div class="score-den">/ 10</div>
      </div>
      <div class="score-msg" id="res-msg"></div>
      <div class="score-sub" id="res-sub"></div>
    </div>
    <div class="card" id="wrong-card" style="display:none">
      <div class="card-title">❌ まちがえた問題</div>
      <ul class="wrong-list" id="wrong-list"></ul>
    </div>
    <button class="btn btn-primary" onclick="App.navigate('home')" style="margin-bottom:10px">🏠 ホームにもどる</button>
    <button class="btn btn-outline" onclick="App.navigate('map')" style="margin-bottom:10px">📊 しんちょくをみる</button>
  </div>

  <!-- ヒートマップ -->
  <div id="screen-map" class="screen">
    <h2>📊 しんちょく マップ</h2>
    <div class="profile-badge" id="map-profile-badge"></div>
    <div class="heatmap-legend">
      <div class="legend-box" style="background:var(--heat0)"></div>未
      <div class="legend-box" style="background:var(--heatlow)"></div>低
      <div class="legend-box" style="background:var(--heatmid)"></div>中
      <div class="legend-box" style="background:var(--heat2)"></div>高
      <div class="legend-box" style="background:var(--heat3)"></div>完璧
    </div>
    <div class="grade-tabs" id="map-tabs"></div>
    <div id="heatmap-content"></div>
  </div>

  <!-- カンジ一覧 -->
  <div id="screen-list" class="screen">
    <h2>📚 漢字いちらん</h2>
    <div class="grade-tabs" id="list-tabs"></div>
    <div id="list-content"></div>
  </div>

  <!-- 学習カレンダー -->
  <div id="screen-calendar" class="screen">
    <h2>📅 学習カレンダー</h2>
    <div class="profile-badge" id="cal-profile-badge"></div>
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="App.changeMonth(-1)">←</button>
      <div class="cal-label" id="cal-label"></div>
      <button class="cal-nav-btn" onclick="App.changeMonth(1)">→</button>
    </div>
    <div class="cal-weekdays">
      <div>日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div id="cal-detail"></div>
  </div>

<script src="kanji-data.js?v=3"></script>
<script src="sentence-data.js?v=3"></script>
<script>
// ─────────────────────────────────────────
// ストレージ
// ─────────────────────────────────────────
const Store = {
  KEY: 'kanji_drill_v1',

  // プロフィール1件分の空データ
  emptyProfile(name, grade) {
    return { name, grade, history: {}, stats: {}, streak: { current: 0, last: '' } };
  },

  // ルート構造（activeProfile ＋ 3人分のprofiles）の初期値
  defaultRoot() {
    return {
      activeProfile: '1',
      profiles: {
        '1': this.emptyProfile('1号', '5'),
        '2': this.emptyProfile('2号', '4'),
        '3': this.emptyProfile('3号', '3')
      }
    };
  },

  // ルート全体を読み込む（旧単一データからの移行も行う）
  loadRoot() {
    let raw;
    try { raw = JSON.parse(localStorage.getItem(this.KEY)); }
    catch { raw = null; }
    if (!raw) return this.defaultRoot();

    // 新形式（プロフィールあり）ならそのまま（欠けたプロフィールは補完）
    if (raw.profiles && raw.activeProfile) {
      const def = this.defaultRoot();
      ['1', '2', '3'].forEach(id => {
        if (!raw.profiles[id]) raw.profiles[id] = def.profiles[id];
      });
      return raw;
    }

    // 旧形式（history/statsがトップレベル）→ 1号へ自動移行
    const root = this.defaultRoot();
    root.profiles['1'] = {
      name: '1号', grade: '5',
      history: raw.history || {},
      stats: raw.stats || {},
      streak: raw.streak || { current: 0, last: '' }
    };
    root.activeProfile = '1';
    this.saveRoot(root);
    return root;
  },

  saveRoot(root) { localStorage.setItem(this.KEY, JSON.stringify(root)); },

  // アクティブなプロフィールのデータを返す
  load() {
    const root = this.loadRoot();
    return root.profiles[root.activeProfile];
  },
  // アクティブなプロフィールのデータを保存
  save(profile) {
    const root = this.loadRoot();
    root.profiles[root.activeProfile] = profile;
    this.saveRoot(root);
  },

  // ── プロフィール操作 ──
  getActiveId() { return this.loadRoot().activeProfile; },
  setActiveId(id) {
    const root = this.loadRoot();
    if (root.profiles[id]) { root.activeProfile = id; this.saveRoot(root); }
  },
  listProfiles() {
    const root = this.loadRoot();
    return ['1', '2', '3'].map(id => ({ id, name: root.profiles[id].name, grade: root.profiles[id].grade }));
  },
  getGrade() { return this.load().grade; },
  setGrade(grade) {
    const p = this.load();
    p.grade = grade;
    this.save(p);
  },
  getName(id) {
    const root = this.loadRoot();
    return (root.profiles[id || root.activeProfile] || {}).name || '';
  },

  today() { return new Date().toISOString().slice(0, 10); },
  getStats(kanjiKey) {
    const d = this.load();
    return d.stats[kanjiKey] || { tested: 0, correct: 0 };
  },
  recordAnswer(kanjiKey, correct) {
    const d = this.load();
    if (!d.stats[kanjiKey]) d.stats[kanjiKey] = { tested: 0, correct: 0 };
    d.stats[kanjiKey].tested++;
    if (correct) d.stats[kanjiKey].correct++;
    this.save(d);
  },
  saveSession(date, questions, answers) {
    const d = this.load();
    const score = answers.filter(Boolean).length;
    d.history[date] = { questions, answers, score };
    // streak
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    if (d.streak.last === yesterday) d.streak.current++;
    else if (d.streak.last !== date) d.streak.current = 1;
    d.streak.last = date;
    this.save(d);
  },
  getTodaySession() {
    const d = this.load();
    return d.history[this.today()] || null;
  },
  getYesterdayWrong() {
    const d = this.load();
    const yest = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const sess = d.history[yest];
    if (!sess) return [];
    return sess.questions.filter((_, i) => !sess.answers[i]);
  },
  getStreak() { return this.load().streak.current || 0; },
  getWeekStats() {
    const d = this.load();
    let total = 0, correct = 0;
    const now = Date.now();
    for (let i = 0; i < 7; i++) {
      const dt = new Date(now - i * 86400000).toISOString().slice(0, 10);
      const s = d.history[dt];
      if (s) { total += s.questions.length; correct += s.score; }
    }
    return { total, correct };
  }
};

// ─────────────────────────────────────────
// クイズエンジン
// ─────────────────────────────────────────
const Quiz = {
  // 問題生成: SENTENCE_DATA の tpl（{{対象}}を含む既習漢字まじりの短文）から問題を作る
  makeProblems(entry) {
    const [kanji, grade] = entry;
    const sents = (typeof SENTENCE_DATA !== 'undefined' && SENTENCE_DATA[kanji]) || [];
    return sents.map(({ tpl, reading, type }) => ({
      kanji, grade, key: `${kanji}_${grade}`,
      type,
      typeCls: type === '書き' ? 'type-kaki' : 'type-jukugo',
      tpl,               // 例: "こう{{園}}で遊ぶ"
      reading            // 対象部分のよみ（かな）
    }));
  },

  allProblems: null,

  getAll() {
    if (this.allProblems) return this.allProblems;
    const arr = [];
    KANJI_DATA.forEach(entry => {
      const ps = this.makeProblems(entry);
      arr.push(...ps);
    });
    this.allProblems = arr;
    return arr;
  },

  TOTAL: 10,

  // アクティブなプロフィールの学年に応じた出題枠を返す
  //  2年生 → 主学年10:下学年0／3〜5年生 → 主学年9:下学年（一つ下）1
  slotPlan(grade) {
    if (grade === '2') return { main: '2', below: null, mainSlots: 10, belowSlots: 0 };
    const below = String(Number(grade) - 1);   // 3→2, 4→3, 5→4
    return { main: grade, below, mainSlots: 9, belowSlots: 1 };
  },

  // 今日の10問を選ぶ（プロフィールの学年に応じた重み付け）
  selectDaily() {
    const grade = Store.getGrade();
    const plan = this.slotPlan(grade);
    const all = this.getAll();
    const usedKeys = new Set();

    // 正解率の低い順・未出題優先で、指定学年プールから補充するヘルパ
    const fillFrom = (gradeVal, slots, target) => {
      if (!gradeVal || target <= 0) return;
      const scored = all
        .filter(p => p.grade === gradeVal && !usedKeys.has(p.key))
        .map(p => {
          const s = Store.getStats(p.key);
          const priority = s.tested === 0 ? 1000 : (1 - s.correct / s.tested) * 100 + Math.random() * 30;
          return { ...p, priority };
        })
        .sort((a, b) => b.priority - a.priority);
      for (const p of scored) {
        if (slots.length >= target) break;
        slots.push(p);
        usedKeys.add(p.key);
      }
    };

    const mainSlots = [];
    const belowSlots = [];

    // 前日の不正解を優先。主学年ぶんは主枠へ、それ以外は「一つ下枠(1問)」へ充てる
    const wrongYest = Store.getYesterdayWrong();
    wrongYest.forEach(q => {
      if (q.grade === plan.main) {
        if (mainSlots.length < plan.mainSlots && !usedKeys.has(q.key)) {
          mainSlots.push({ ...q, isRetry: true }); usedKeys.add(q.key);
        }
      } else if (plan.belowSlots > 0) {
        if (belowSlots.length < plan.belowSlots && !usedKeys.has(q.key)) {
          belowSlots.push({ ...q, isRetry: true }); usedKeys.add(q.key);
        }
      }
    });

    // 残りを補充：主学年 → 一つ下の学年
    fillFrom(plan.main, mainSlots, plan.mainSlots);
    fillFrom(plan.below, belowSlots, plan.belowSlots);

    // 「一つ下」に十分な在庫がない等で10問に満たない場合は主学年で埋める
    let result = [...mainSlots, ...belowSlots];
    if (result.length < this.TOTAL) {
      fillFrom(plan.main, result, this.TOTAL);
    }

    return shuffle(result.slice(0, this.TOTAL));
  }
};

// tpl: "こう{{園}}で遊ぶ" のような文字列から各表示形式を作る
const TPL_RE = /\{\{(.*?)\}\}/;

// 出題文（対象部分はかな・下線つき）
function fmtQuestion(q) {
  return q.tpl.replace(TPL_RE, '<u class="tgt-u">' + q.reading + '</u>');
}
// 答え文（対象部分は漢字・色つき）
function fmtAnswer(q) {
  return q.tpl.replace(TPL_RE, (_, k) => '<span class="tgt">' + k + '</span>');
}
// プレーンテキスト版（結果画面の一覧などで使用）
function plainQuestion(q) {
  return q.tpl.replace(TPL_RE, q.reading);
}
function plainAnswer(q) {
  return q.tpl.replace(TPL_RE, (_, k) => k);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────
// アプリ状態
// ─────────────────────────────────────────
const App = {
  questions: [],
  answers: [],
  currentQ: 0,
  answered: false,
  mapGrade: '4',
  listGrade: '4',

  navigate(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`screen-${screen}`).classList.add('active');
    const nb = document.getElementById(`nav-${screen}`);
    if (nb) nb.classList.add('active');
    if (screen === 'home') this.renderHome();
    if (screen === 'map') this.renderMap();
    if (screen === 'list') this.renderList();
    if (screen === 'calendar') this.renderCalendar();
  },

  startQuiz() {
    const sess = Store.getTodaySession();
    if (sess) {
      if (!confirm('今日はすでにテストをやりました。もう一度やりますか？')) return;
    }
    this.questions = Quiz.selectDaily();
    this.answers = new Array(this.questions.length).fill(null);
    this.navigate('quiz');
    this.renderAllQuestions();
  },

  // ── 出題フェーズ: 10問を最初から一覧表示（答えは見せない）──
  renderAllQuestions() {
    const n = this.questions.length;
    document.getElementById('qprogress').style.width = '50%';
    document.getElementById('qcounter').textContent = `全${n}問`;

    const items = this.questions.map((q, i) => `
      <div class="card q-item">
        <div class="grade-item-top">
          <span class="gnum">${i + 1}</span>
          <span class="quiz-type-badge ${q.typeCls}">${q.type}問題</span>
          ${q.isRetry ? '<span class="retry-badge">🔁 前回まちがえた</span>' : ''}
        </div>
        <div class="quiz-reading">${fmtQuestion(q)}</div>
      </div>
    `).join('');

    document.getElementById('quiz-content').innerHTML = `
      <div class="paper-hint">✍️ かみとえんぴつを よういしてね！<br>
        <span style="font-weight:normal;font-size:12px">かみに ①〜${n}の ばんごうを かいて、せんの ことばを かん字で かこう</span>
      </div>
      ${items}
      <button class="btn btn-success" onclick="App.renderGrading()">✅ 答えあわせへ</button>
    `;
    window.scrollTo(0, 0);
  },

  // ── 答え合わせフェーズ: 10問まとめて○×採点 ──
  renderGrading() {
    document.getElementById('qprogress').style.width = '100%';
    document.getElementById('qcounter').textContent = '採点';

    const items = this.questions.map((q, i) => `
      <div class="card grade-item" id="gitem-${i}">
        <div class="grade-item-top">
          <span class="gnum">${i + 1}</span>
          <span class="gq">${plainQuestion(q)}</span>
        </div>
        <div class="ganswer">${fmtAnswer(q)}</div>
        <div class="btn-row">
          <button class="btn btn-maru gbtn" id="gm-${i}" onclick="App.setGrade(${i}, true)">⭕</button>
          <button class="btn btn-batsu gbtn" id="gb-${i}" onclick="App.setGrade(${i}, false)">❌</button>
        </div>
      </div>
    `).join('');

    document.getElementById('quiz-content').innerHTML = `
      <h2>📖 答えあわせ</h2>
      <div class="grade-check-label" style="margin-bottom:14px">かみの答えとくらべて、⭕か❌をえらんでね<br>（おうちの人といっしょにチェックしてもいいよ）</div>
      ${items}
      <button class="btn btn-success" id="btn-finish" disabled onclick="App.finishQuiz()">あと10問 チェックしてね</button>
    `;
    window.scrollTo(0, 0);
  },

  setGrade(i, correct) {
    this.answers[i] = correct;
    const gm = document.getElementById(`gm-${i}`);
    const gb = document.getElementById(`gb-${i}`);
    gm.classList.toggle('gsel', correct);
    gm.classList.toggle('gdim', !correct);
    gb.classList.toggle('gsel', !correct);
    gb.classList.toggle('gdim', correct);
    const remaining = this.answers.filter(a => a === null).length;
    const btn = document.getElementById('btn-finish');
    if (remaining === 0) {
      btn.disabled = false;
      btn.textContent = '💾 きろくする';
    } else {
      btn.textContent = `あと${remaining}問 チェックしてね`;
    }
  },

  finishQuiz() {
    if (this.answers.some(a => a === null)) return;
    this.questions.forEach((q, i) => Store.recordAnswer(q.key, this.answers[i]));
    Store.saveSession(Store.today(), this.questions, this.answers);
    this.renderResult();
    this.navigate('result');
    window.scrollTo(0, 0);
  },

  renderResult() {
    const score = this.answers.filter(Boolean).length;
    const total = this.questions.length;
    document.getElementById('res-score').textContent = score;
    const pct = Math.round(score / total * 100);
    let msg, sub;
    if (pct === 100) { msg = '🎉 かんぺき！すごい！'; sub = '全問正解！今日もよくがんばりました！'; }
    else if (pct >= 80) { msg = '😊 よくできました！'; sub = `${score}問せいかい！あと少し！`; }
    else if (pct >= 60) { msg = '👍 よくがんばりました！'; sub = 'まちがえた問題は明日また出るよ！'; }
    else { msg = '💪 練習あるのみ！'; sub = 'まちがえた問題をしっかり覚えよう！'; }
    document.getElementById('res-msg').textContent = msg;
    document.getElementById('res-sub').textContent = sub;

    const wrongs = this.questions.filter((_, i) => !this.answers[i]);
    if (wrongs.length > 0) {
      document.getElementById('wrong-card').style.display = '';
      document.getElementById('wrong-list').innerHTML = wrongs.map(q => `
        <li class="wrong-item">
          <div class="wrong-kanji">${q.kanji}</div>
          <div class="wrong-detail">
            <div class="wrong-q">${plainQuestion(q)}</div>
            <div class="wrong-a">正解: ${plainAnswer(q)}</div>
          </div>
        </li>
      `).join('');
    }
    document.getElementById('nav-result') && document.getElementById('nav-result').classList.add('active');
  },

  // プロフィール切り替え・学年選択タブを描画
  renderProfileControls() {
    const activeId = Store.getActiveId();
    const profiles = Store.listProfiles();
    document.getElementById('profile-tabs').innerHTML = profiles.map(p =>
      `<button class="profile-btn ${p.id === activeId ? 'active' : ''}" onclick="App.switchProfile('${p.id}')">
        ${p.name}<span class="p-grade">${p.grade}年生</span>
      </button>`
    ).join('');

    const grade = Store.getGrade();
    const grades = ['2', '3', '4', '5'];
    document.getElementById('home-grade-tabs').innerHTML = grades.map(g =>
      `<button class="grade-tab ${g === grade ? 'active' : ''}" onclick="App.changeProfileGrade('${g}')">${g}年生</button>`
    ).join('');

    document.getElementById('home-subtitle').textContent =
      `${Store.getName()}のもんだい（${grade}年生ちゅうしん）`;
  },

  // 子ども（プロフィール）を切り替える
  switchProfile(id) {
    Store.setActiveId(id);
    this.calView = null;         // カレンダー表示月をリセット
    this.renderHome();
  },

  // アクティブなプロフィールの学年を変更する
  changeProfileGrade(g) {
    Store.setGrade(g);
    this.renderHome();
  },

  renderHome() {
    this.renderProfileControls();
    document.getElementById('streak-num').textContent = Store.getStreak();
    const ws = Store.getWeekStats();
    document.getElementById('stat-total').textContent = ws.total;
    document.getElementById('stat-correct').textContent = ws.correct;
    document.getElementById('stat-rate').textContent = ws.total ? Math.round(ws.correct / ws.total * 100) + '%' : '-';

    const streak = Store.getStreak();
    const badges = [];
    if (streak >= 3) badges.push('🥉');
    if (streak >= 7) badges.push('🥈');
    if (streak >= 30) badges.push('🥇');
    if (streak >= 100) badges.push('🏆');
    const d = Store.load();
    const totalAnswered = Object.values(d.stats).reduce((s, v) => s + v.tested, 0);
    if (totalAnswered >= 50) badges.push('⭐');
    if (totalAnswered >= 200) badges.push('🌟');
    document.getElementById('badges').textContent = badges.join(' ') || '（まだバッジなし）';

    const sess = Store.getTodaySession();
    const statusEl = document.getElementById('today-status');
    if (sess) {
      statusEl.innerHTML = `
        <div class="today-done-banner">
          <div class="big">✅ ${sess.score}/10</div>
          <p>今日のテストはおわっています！<br>また明日！</p>
        </div>
      `;
    } else {
      statusEl.innerHTML = `
        <button class="btn btn-success" onclick="App.startQuiz()" style="margin-bottom:14px">
          📝 今日の10問をはじめる
        </button>
      `;
    }
  },

  renderMap() {
    // 初回はアクティブなプロフィールの学年を初期表示にする
    if (this._mapProfileSeen !== Store.getActiveId()) {
      this.mapGrade = Store.getGrade();
      this._mapProfileSeen = Store.getActiveId();
    }
    document.getElementById('map-profile-badge').textContent = `👦 ${Store.getName()}の記録`;

    const grades = ['2', '3', '4', '5'];
    // tabs
    document.getElementById('map-tabs').innerHTML = grades.map(g =>
      `<button class="grade-tab ${g === this.mapGrade ? 'active' : ''}"
        onclick="App.mapGrade='${g}';App.renderMap()">${g}年生</button>`
    ).join('');

    const entries = KANJI_DATA.filter(e => e[1] === this.mapGrade);
    const grid = entries.map(entry => {
      const [kanji] = entry;
      const key = `${kanji}_${this.mapGrade}`;
      const st = Store.getStats(key);
      let cls = 'heat-none', pct = '';
      if (st.tested > 0) {
        const r = st.correct / st.tested;
        pct = Math.round(r * 100) + '%';
        if (r >= 1) cls = 'heat-perfect';
        else if (r >= 0.8) cls = 'heat-high';
        else if (r >= 0.5) cls = 'heat-mid';
        else cls = 'heat-low';
      }
      return `<div class="heat-cell ${cls}" onclick="showModal('${kanji}','${this.mapGrade}')"
        title="${kanji}: ${st.tested ? st.correct+'/'+st.tested : '未出題'}">
        ${kanji}<span class="cell-pct">${pct}</span>
      </div>`;
    }).join('');

    document.getElementById('heatmap-content').innerHTML =
      `<div class="heatmap-grid">${grid}</div>`;
  },

  renderList() {
    const grades = ['2', '3', '4', '5'];
    document.getElementById('list-tabs').innerHTML = grades.map(g =>
      `<button class="grade-tab ${g === this.listGrade ? 'active' : ''}"
        onclick="App.listGrade='${g}';App.renderList()">${g}年生</button>`
    ).join('');

    const entries = KANJI_DATA.filter(e => e[1] === this.listGrade);
    const grid = entries.map(([kanji, grade]) =>
      `<div class="kl-cell grade${grade}-bg" onclick="showModal('${kanji}','${grade}')">${kanji}</div>`
    ).join('');
    document.getElementById('list-content').innerHTML =
      `<div class="kanji-list-grid">${grid}</div>`;
  },

  calView: null,

  renderCalendar() {
    const now = new Date();
    if (!this.calView) this.calView = { y: now.getFullYear(), m: now.getMonth() };
    const { y, m } = this.calView;
    const d = Store.load();

    document.getElementById('cal-profile-badge').textContent = `👦 ${Store.getName()}の記録`;
    document.getElementById('cal-label').textContent = `${y}年${m + 1}月`;
    document.getElementById('cal-detail').innerHTML = '';

    const firstDow = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const todayStr = Store.today();

    let cells = '';
    for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      const sess = d.history[dateStr];
      const cls = ['cal-cell'];
      if (sess) cls.push('cal-done');
      if (dateStr === todayStr) cls.push('cal-today');
      cells += `<div class="${cls.join(' ')}" onclick="App.showCalDay('${dateStr}')">
        <span class="cal-day">${day}</span>
        ${sess ? '<span class="cal-check">✅</span>' : ''}
      </div>`;
    }
    document.getElementById('cal-grid').innerHTML = cells;
  },

  changeMonth(delta) {
    let { y, m } = this.calView;
    m += delta;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    this.calView = { y, m };
    this.renderCalendar();
  },

  showCalDay(dateStr) {
    const d = Store.load();
    const sess = d.history[dateStr];
    const box = document.getElementById('cal-detail');
    if (!sess) {
      box.innerHTML = `<div class="cal-detail-box"><div class="cal-detail-date">${dateStr}</div>この日は学習していません</div>`;
      return;
    }
    box.innerHTML = `
      <div class="cal-detail-box">
        <div class="cal-detail-date">${dateStr}</div>
        <div class="cal-detail-score">${sess.score} / ${sess.questions.length} 問正解</div>
      </div>
    `;
  }
};

// ─────────────────────────────────────────
// モーダル
// ─────────────────────────────────────────
function showModal(kanji, grade) {
  const entry = KANJI_DATA.find(e => e[0] === kanji && e[1] === grade);
  if (!entry) return;
  const [k, g, ons, kuns, words] = entry;
  document.getElementById('modal-kanji').textContent = k;
  document.getElementById('modal-reading').innerHTML =
    `音：${ons.join('・') || '-'}　訓：${kuns.join('・') || '-'}`;
  document.getElementById('modal-words').innerHTML =
    words.map(([w, r]) => `<div class="modal-word">📖 ${w}（${r}）</div>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('open');
  }
}

// ─────────────────────────────────────────
// 起動
// ─────────────────────────────────────────
App.renderHome();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
